# ─── Application ─────────────────────────────────────────────
spring.application.name=spms-backend
server.port=8080
server.servlet.context-path=/api/v1

# ─── Active Profile (override with -Dspring.profiles.active=mysql) ──
spring.profiles.active=h2

# ─── JPA Common Settings ─────────────────────────────────────
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG

# ─── Pageable (Spring Data Web) ──────────────────────────────
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# ─── JWT ─────────────────────────────────────────────────────
# 256-bit base64-encoded secret — CHANGE before any production deployment!
# Generated: echo -n "spms-super-secret-key-change-me-now-32chars" | base64
jwt.secret=c3Btcy1zdXBlci1zZWNyZXQta2V5LWNoYW5nZS1tZS1ub3ctMzJjaGFycw==

# ─── CORS ────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:3000
