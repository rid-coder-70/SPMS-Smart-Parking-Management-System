# ─── MySQL (Day-3 Integration / Production) ──────────────────
# Copy this file to application-mysql.properties and fill in real values
# OR set these as environment variables / Docker secrets

spring.datasource.url=jdbc:mysql://localhost:3306/spmsdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:spms_user}
spring.datasource.password=${DB_PASSWORD:spms_pass}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

logging.level.com.spms=INFO
